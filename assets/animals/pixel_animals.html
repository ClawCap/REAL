<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  body { background: #111122; display: flex; flex-wrap: wrap; gap: 32px; padding: 40px; justify-content: center; font-family: -apple-system, "PingFang SC", sans-serif; }
  .card { text-align: center; width: 170px; }
  .card .name { color: #e2e8f0; font-size: 14px; font-weight: 700; margin-top: 8px; }
  .card .type { color: #64748b; font-size: 11px; margin-top: 2px; }
  svg { border-radius: 14px; background: #1e1e36; }
</style>
</head>
<body>
<script>
const S = 5, G = 32;
function mkSvg(art, pal) {
  const ns = 'http://www.w3.org/2000/svg';
  const svg = document.createElementNS(ns, 'svg');
  svg.setAttribute('width', G*S); svg.setAttribute('height', G*S);
  svg.setAttribute('viewBox', `0 0 ${G*S} ${G*S}`);
  svg.setAttribute('shape-rendering', 'crispEdges');
  for (let y = 0; y < art.length; y++)
    for (let x = 0; x < art[y].length; x++) {
      const c = art[y][x];
      if (c !== '.' && pal[c]) {
        const r = document.createElementNS(ns, 'rect');
        r.setAttribute('x', x*S); r.setAttribute('y', y*S);
        r.setAttribute('width', S); r.setAttribute('height', S);
        r.setAttribute('fill', pal[c]);
        svg.appendChild(r);
      }
    }
  return svg;
}
function card(name, type, lines, pal) {
  const d = document.createElement('div');
  d.className = 'card';
  d.appendChild(mkSvg(lines.map(l=>l.split('')), pal));
  d.innerHTML += `<div class="name">${name}</div><div class="type">${type}</div>`;
  document.body.appendChild(d);
}
